<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractal Tree</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    #canvas-container { position: relative; width: 400px; height: 400px; }
    #hud { position: absolute; top: 12px; left: 14px; font-family: sans-serif; font-size: 13px; color: #f8f8f8; pointer-events: none; }
    #hud span { font-weight: bold; }
    #hint { position: absolute; top: 12px; right: 14px; font-family: sans-serif; font-size: 13px; color: #f8f8f8; pointer-events: none; }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="hud">angle: <span id="angle-display">45°</span></div>
    <div id="hint">scroll to change angle</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script>
    let angle = Math.PI / 4;
    let targetAngle = Math.PI / 4;
    const display = document.getElementById('angle-display');

    const sketch = (p) => {
      p.setup = () => {
        const canvas = p.createCanvas(400, 400);
        canvas.parent('canvas-container');
      };

      p.draw = () => {
        angle += (targetAngle - angle) * 0.12;
        p.background(51);
        p.stroke(255);
        p.translate(p.width / 2, p.height);
        branch(p, 100);
        display.textContent = Math.round(angle * 180 / Math.PI) + '°';
      };
    };

    function branch(p, len) {
      p.line(0, 0, 0, -len);
      p.translate(0, -len);
      if (len > 4) {
        p.push();
        p.rotate(angle);
        branch(p, len * 0.67);
        p.pop();
        p.push();
        p.rotate(-angle);
        branch(p, len * 0.67);
        p.pop();
      }
    }

    new p5(sketch);

    const container = document.getElementById('canvas-container');
    container.addEventListener('wheel', (e) => {
      e.preventDefault();
      targetAngle += e.deltaY * 0.001;
      targetAngle = Math.max(0.05, Math.min(Math.PI * 0.9, targetAngle));
    }, { passive: false });
  </script>
</body>
</html>
